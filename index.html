<!DOCTYPE html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glücksrad</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#0b0b2b;
color:white;
margin:0;
}

#wheel{
width:320px;
height:320px;
margin:30px auto;
border-radius:50%;
border:8px solid gold;

background:conic-gradient(
red 0 60deg,
yellow 60deg 120deg,
blue 120deg 180deg,
red 180deg 240deg,
yellow 240deg 300deg,
blue 300deg 360deg
);

transition:transform 4s ease-out;
}

#pointer{
width:0;
height:0;

border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:40px solid gold;

margin:auto;
}

button{

padding:15px 30px;
font-size:18px;
background:orange;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

#result{
margin-top:20px;
font-size:35px;
color:gold;
}

</style>
</head>

<body>

<h2>🎡 Dreh am Glücksrad</h2>

<div id="pointer"></div>

<div id="wheel"></div>

<button onclick="spin()">Rad drehen</button>

<div id="result"></div>

<script>

let prizes=["20€","25€","30€","20€","25€","30€"];

let spinning=false;

function spin(){

if(spinning) return;

spinning=true;

let wheel=document.getElementById("wheel");

let index=Math.floor(Math.random()*prizes.length);

let rotation=720+(index*60);

wheel.style.transform="rotate("+rotation+"deg)";

setTimeout(()=>{

document.getElementById("result").innerText="Gewinn: "+prizes[index];

spinning=false;

},4000);

}

</script>

</body>
</html>
