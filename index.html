<!DOCTYPE html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glücksrad</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:radial-gradient(circle,#0b0b2b,#000);
color:white;
}

canvas{
margin-top:20px;
border-radius:50%;
box-shadow:0 0 40px gold;
}

#pointer{
width:0;
height:0;
border-left:22px solid transparent;
border-right:22px solid transparent;
border-bottom:40px solid gold;
margin:auto;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
background:linear-gradient(#ffd700,#ff8c00);
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

#result{
font-size:40px;
color:gold;
margin-top:20px;
}

</style>
</head>

<body>

<h2>🎡 Dreh am Glücksrad</h2>

<div id="pointer"></div>

<canvas id="wheel" width="360" height="360"></canvas>

<br>

<button onclick="spin()">Rad drehen</button>

<div id="result"></div>

<script>

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const segments=["20€","25€","30€","20€","25€","30€"];

const colors=[
"#ff3b3b",
"#ffd93d",
"#3399ff",
"#ff3b3b",
"#ffd93d",
"#3399ff"
];

let rotation=0;

function drawWheel(){

ctx.clearRect(0,0,360,360);

let arc=2*Math.PI/segments.length;

for(let i=0;i<segments.length;i++){

let angle=i*arc+rotation;

ctx.beginPath();

ctx.fillStyle=colors[i];

ctx.moveTo(180,180);
ctx.arc(180,180,170,angle,angle+arc);

ctx.fill();

ctx.save();

ctx.translate(180,180);

ctx.rotate(angle+arc/2);

ctx.fillStyle="white";
ctx.font="bold 26px Arial";
ctx.textAlign="right";

ctx.fillText(segments[i],150,10);

ctx.restore();

}

ctx.beginPath();
ctx.arc(180,180,40,0,Math.PI*2);
ctx.fillStyle="gold";
ctx.fill();

}

drawWheel();

let spinning=false;

function spin(){

if(spinning) return;

spinning=true;

let index=Math.floor(Math.random()*segments.length);

let arc=2*Math.PI/segments.length;

let target=(Math.PI*2*5)+(Math.PI*2-(index*arc)-arc/2);

let start=rotation;

let duration=4000;

let startTime=null;

function animate(t){

if(!startTime) startTime=t;

let progress=t-startTime;

let percent=Math.min(progress/duration,1);

rotation=start+(target-start)*percent;

drawWheel();

if(percent<1){

requestAnimationFrame(animate);

}else{

spinning=false;

document.getElementById("result").innerText="Gewinn: "+segments[index];

}

}

requestAnimationFrame(animate);

}

</script>

</body>
</html>
